<!doctype html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ChatGPT 웹페이지 만들기</title>

    <link rel="stylesheet"
        href="https://s3.ap-northeast-2.amazonaws.com/materials.spartacodingclub.kr/easygpt/default.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
        crossorigin="anonymous">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
        crossorigin="anonymous"></script>

    <style>
        /* Hero 스타일 */
        .hero {
            background-color: #1f252d;
            color: white;
            text-align: center;
            padding: 100px 20px;
        }

        .hero h1 {
            font-size: 70px;
            font-weight: 300;
        }

        .hero p {
            font-size: 24px;
            margin-top: 15px;
        }

        /* 카드 스타일 */
        .card {
            height: 100%;
            transition: transform 0.3s ease;
        }

        /* 마우스를 올렸을 때 부드럽게 확대 */
        .card:hover {
            transform: scale(1.05);
        }

        /* 이미지 크기 동일 */
        .card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }
    </style>
</head>

<body>

    <!-- Hero Section -->
    <section class="hero">
        <div class="container">
            <h1>jaeeon 사진공유 페이지</h1>
            <p>사진을 공유합니다</p>
        </div>
    </section>

    <!-- Card Section -->
    <div class="container my-5">
        <div class="row g-4">

            <!-- 카드 1 -->
            <div class="col-md-4">
                <div class="card">
                    <img src="https://images.pexels.com/photos/417074/pexels-photo-417074.jpeg"
                        class="card-img-top" alt="산 풍경">
                    <div class="card-body">
                        <h3 class="card-title">푸른 산의 풍경</h3>
                        <h5 class="text-muted">자연 사진</h5>
                        <p class="card-text">
                            맑은 하늘과 푸른 산이 어우러진 아름다운 자연 풍경 사진입니다.
                        </p>
                    </div>
                </div>
            </div>

            <!-- 카드 2 -->
            <div class="col-md-4">
                <div class="card">
                    <img src="https://images.pexels.com/photos/210186/pexels-photo-210186.jpeg"
                        class="card-img-top" alt="바다 풍경">
                    <div class="card-body">
                        <h3 class="card-title">잔잔한 바다의 여유</h3>
                        <h5 class="text-muted">여행 사진</h5>
                        <p class="card-text">
                            고요한 바다와 시원한 풍경이 마음의 평화를 주는 사진입니다.
                        </p>
                    </div>
                </div>
            </div>

            <!-- 카드 3 -->
            <div class="col-md-4">
                <div class="card">
                    <img src="https://images.pexels.com/photos/34950/pexels-photo.jpg"
                        class="card-img-top" alt="숲 풍경">
                    <div class="card-body">
                        <h3 class="card-title">초록 숲속의 산책길</h3>
                        <h5 class="text-muted">힐링 사진</h5>
                        <p class="card-text">
                            싱그러운 숲길을 걸으며 자연의 편안함을 느낄 수 있는 사진입니다.
                        </p>
                    </div>
                </div>
            </div>

        </div>
    </div>

</body>

</html>
