<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>과제 1번 - 오늘의 플레이리스트</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Single+Day&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #121212; /* 플레이리스트 느낌의 어두운 배경 */
            color: white;
            text-align: center;
            padding: 50px;
        }

        h1 {
            font-family: 'Nanum Pen Script', cursive;
            font-size: 70px;
            color: #1DB954; /* 스포티파이 느낌의 초록색 */
            margin-bottom: 40px;
        }

        .playlist-container {
            display: inline-block;
            text-align: left;
            background: #1e1e1e;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 400px;
        }

        .song-item {
            margin-bottom: 25px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        .song-title {
            font-family: 'Single Day', cursive;
            font-size: 28px;
            display: block;
        }

        .artist {
            font-family: 'Single Day', cursive;
            font-size: 18px;
            color: #b3b3b3;
        }

        .tag {
            font-size: 12px;
            background: #333;
            padding: 3px 8px;
            border-radius: 5px;
            margin-left: 10px;
        }
    </style>
</head>
<body>

    <h1>🎧 Today's Playlist</h1>

    <div class="playlist-container">
        <div class="song-item">
            <span class="song-title">주저하는 연인들을 위해</span>
            <span class="artist">잔나비 <span class="tag">JANNABI</span></span>
        </div>

        <div class="song-item">
            <span class="song-title">TOMBOY</span>
            <span class="artist">혁오 <span class="tag">HYUKOH</span></span>
        </div>

        <div class="song-item">
            <span class="song-title">뜨거운 여름밤은 가고 남은 건 볼품없지만</span>
            <span class="artist">잔나비 <span class="tag">JANNABI</span></span>
        </div>
    </div>

</body>
</html>
